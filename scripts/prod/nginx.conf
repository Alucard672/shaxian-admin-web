# ================================================================
# Nginx 生产环境配置 - 管理端 (admin.jiyizhiyun.com)
# SSL: Let's Encrypt (certbot 自动管理)
#
# 说明:
#   首次部署时需手动创建此配置到服务器:
#   scp scripts/prod/nginx.conf root@112.124.109.7:/etc/nginx/conf.d/shaxian-admin.conf
#   然后执行 certbot --nginx -d admin.jiyizhiyun.com 申请 SSL 证书
#   certbot 会自动修改此配置添加 SSL 相关内容
# ================================================================

server {
    listen 80;
    server_name admin.jiyizhiyun.com;

    # ---- 前端静态文件 ----
    root /web/deploy/shaxian-admin;
    index index.html;

    # SPA 路由支持
    location / {
        try_files $uri $uri/ /index.html;

        # 静态资源缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ---- 后端 API 反向代理 ----
    # 管理端前端使用 /api/ 路径，后端实际路径为 /biz/api/
    # Nginx 自动重写: /api/xxx → /biz/api/xxx
    location /api/ {
        proxy_pass http://127.0.0.1:8080/biz/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 30s;
        proxy_read_timeout 120s;
        proxy_send_timeout 60s;

        client_max_body_size 20m;
    }

    # ---- 日志 ----
    access_log /var/log/nginx/shaxian-admin-access.log;
    error_log  /var/log/nginx/shaxian-admin-error.log;

    # ---- Gzip 压缩 ----
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}
