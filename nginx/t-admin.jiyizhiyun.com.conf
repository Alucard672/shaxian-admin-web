# 测试环境管理端 Nginx 配置
# 部署位置：/etc/nginx/conf.d/t-admin.jiyizhiyun.com.conf
# 后端 upstream 复用 shaxian-server.conf 里已有的 shaixna-server (127.0.0.1:8082)
#
# 申请 SSL（首次执行一次）：
#   certbot --nginx -d t-admin.jiyizhiyun.com
# 申请后 certbot 会自动加上 ssl_certificate / 80→443 跳转配置

server {
    listen 80;
    server_name t-admin.jiyizhiyun.com;

    root /web/deploy/shaxian-admin;
    index index.html;

    access_log /var/log/nginx/t-admin_access.log;
    error_log  /var/log/nginx/t-admin_error.log;

    # 管理端代码调用 /api/xxx → 后端实际接口在 /biz/api/xxx
    location /api/ {
        proxy_pass http://127.0.0.1:8082/biz/api/;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_connect_timeout 300s;
        proxy_read_timeout    300s;
    }

    # SPA 静态资源 + 路由兜底
    location / {
        try_files $uri $uri/ /index.html;
    }
}
