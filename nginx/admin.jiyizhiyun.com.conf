# 生产环境管理端 Nginx 配置
# 部署位置：/etc/nginx/conf.d/admin.jiyizhiyun.com.conf
#
# 前置：
#   1) DNS：admin.jiyizhiyun.com → 112.124.109.7（已加）
#   2) 后端实际监听端口请按生产环境实际填写（测试是 8082）
#   3) 申请 SSL（首次执行一次）：certbot --nginx -d admin.jiyizhiyun.com

server {
    listen 80;
    server_name admin.jiyizhiyun.com;

    root /web/deploy/shaxian-admin;
    index index.html;

    access_log /var/log/nginx/admin_access.log;
    error_log  /var/log/nginx/admin_error.log;

    # 管理端代码调用 /api/xxx → 后端 /biz/api/xxx
    # 注意：把 8082 替换成生产后端实际端口
    location /api/ {
        proxy_pass http://127.0.0.1:8082/biz/api/;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_connect_timeout 300s;
        proxy_read_timeout    300s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
